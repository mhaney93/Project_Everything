server {
    listen 80;
    server_name matthew-haney.com www.matthew-haney.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name matthew-haney.com www.matthew-haney.com;

    ssl_certificate /etc/letsencrypt/live/matthew-haney.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matthew-haney.com/privkey.pem;

    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 60M;
    }

    location /health {
        proxy_pass http://api:5000/health;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
