server {
    listen 80;
    server_name preveil.online www.preveil.online;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name preveil.online www.preveil.online;

    ssl_certificate /etc/letsencrypt/live/preveil.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preveil.online/privkey.pem;

    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 60M;
    }

    location /health {
        proxy_pass http://api:5000/health;
        proxy_set_header Host $host;
    }

    location ~* \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
